<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Multi Slide Test</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        .slide {
            width: 1280px;
            height: 720px;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <div class="slide"
        style="background: linear-gradient(135deg, #667eea, #764ba2); display:flex; align-items:center; justify-content:center; flex-direction:column;">
        <h1 style="color:white; font-size:60px; font-weight:bold;">Slide 1</h1>
        <p style="color:rgba(255,255,255,0.8); font-size:24px; margin-top:20px;">First slide content</p>
    </div>

    <div class="slide"
        style="background: linear-gradient(135deg, #f093fb, #f5576c); display:flex; align-items:center; justify-content:center; flex-direction:column;">
        <h1 style="color:white; font-size:60px; font-weight:bold;">Slide 2</h1>
        <p style="color:rgba(255,255,255,0.8); font-size:24px; margin-top:20px;">Second slide content</p>
    </div>

    <div class="slide"
        style="background: linear-gradient(135deg, #4facfe, #00f2fe); display:flex; align-items:center; justify-content:center; flex-direction:column;">
        <h1 style="color:white; font-size:60px; font-weight:bold;">Slide 3</h1>
        <p style="color:rgba(255,255,255,0.8); font-size:24px; margin-top:20px;">Third slide content</p>
    </div>

</body>

</html>
